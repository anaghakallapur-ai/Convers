<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Convers - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<style>
.material-symbols-outlined{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;font-size:24px;line-height:1;display:inline-block;-webkit-font-smoothing:antialiased;}
.glass-panel{background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);border:1px solid rgba(62,72,78,0.6);}
</style>
<script>
tailwind.config={darkMode:"class",theme:{extend:{colors:{"background":"#131313","on-background":"#e2e2e2","surface-container":"#1f1f1f","surface-container-high":"#2a2a2a","primary":"#b3e5ff","primary-container":"#64cefb","on-primary-container":"#005671","outline-variant":"#3e484e","error":"#ffb4ab"},fontFamily:{"body-md":["Inter"]}}}}
</script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-4">
<video autoplay class="fixed inset-0 w-full h-full object-cover z-0 opacity-30" loop muted playsinline>
  <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260328_105406_16f4600d-7a92-4292-b96e-b19156c7830a.mp4" type="video/mp4"/>
</video>
<div class="relative z-10 w-full max-w-md">
  <div class="text-center mb-8">
    <a href="index.html" class="inline-flex items-center gap-2 no-underline">
      <div class="w-8 h-8 rounded-full border border-white flex items-center justify-center"><div class="w-2 h-2 bg-white rounded-full"></div></div>
      <span class="text-white font-bold text-2xl">Convers</span>
    </a>
  </div>
  <div class="glass-panel rounded-3xl p-8">
    <div class="flex mb-6 bg-white/5 rounded-xl p-1">
      <button onclick="showTab('login')" id="tab-login" class="flex-1 py-2 rounded-lg text-sm font-semibold transition bg-primary-container text-on-primary-container">Login</button>
      <button onclick="showTab('signup')" id="tab-signup" class="flex-1 py-2 rounded-lg text-sm font-semibold transition text-white/60">Sign Up</button>
    </div>
    <div id="error-msg" class="hidden bg-red-500/20 border border-red-500/30 text-red-200 text-sm p-3 rounded-xl mb-4"></div>
    <!-- Login Form -->
    <form id="login-form" onsubmit="handleLogin(event)" class="flex flex-col gap-4">
      <div><label class="text-white/60 text-xs block mb-1">Username</label>
        <input type="text" id="l-user" required class="w-full bg-white/5 border border-outline-variant rounded-lg px-3 py-2.5 text-white text-sm focus:border-primary-container focus:ring-0"/></div>
      <div><label class="text-white/60 text-xs block mb-1">Password</label>
        <input type="password" id="l-pass" required class="w-full bg-white/5 border border-outline-variant rounded-lg px-3 py-2.5 text-white text-sm focus:border-primary-container focus:ring-0"/></div>
      <button type="submit" class="w-full bg-primary-container text-on-primary-container py-3 rounded-xl font-bold text-sm hover:bg-primary transition">Login</button>
    </form>
    <!-- Signup Form -->
    <form id="signup-form" onsubmit="handleSignup(event)" class="flex flex-col gap-4 hidden">
      <div><label class="text-white/60 text-xs block mb-1">Display Name</label>
        <input type="text" id="s-name" required class="w-full bg-white/5 border border-outline-variant rounded-lg px-3 py-2.5 text-white text-sm focus:border-primary-container focus:ring-0"/></div>
      <div><label class="text-white/60 text-xs block mb-1">Username</label>
        <input type="text" id="s-user" required minlength="3" class="w-full bg-white/5 border border-outline-variant rounded-lg px-3 py-2.5 text-white text-sm focus:border-primary-container focus:ring-0"/></div>
      <div><label class="text-white/60 text-xs block mb-1">Password</label>
        <input type="password" id="s-pass" required minlength="4" class="w-full bg-white/5 border border-outline-variant rounded-lg px-3 py-2.5 text-white text-sm focus:border-primary-container focus:ring-0"/></div>
      <button type="submit" class="w-full bg-primary-container text-on-primary-container py-3 rounded-xl font-bold text-sm hover:bg-primary transition">Create Account</button>
    </form>
    <p class="text-center text-white/30 text-xs mt-6"><a href="index.html" class="text-primary-container hover:underline">Continue as guest</a> (no progress saved)</p>
  </div>
</div>
<script>
const API=window.location.origin+'/api';
function showTab(t){
  document.getElementById('login-form').classList.toggle('hidden',t!=='login');
  document.getElementById('signup-form').classList.toggle('hidden',t!=='signup');
  document.getElementById('tab-login').className='flex-1 py-2 rounded-lg text-sm font-semibold transition '+(t==='login'?'bg-primary-container text-on-primary-container':'text-white/60');
  document.getElementById('tab-signup').className='flex-1 py-2 rounded-lg text-sm font-semibold transition '+(t==='signup'?'bg-primary-container text-on-primary-container':'text-white/60');
  document.getElementById('error-msg').classList.add('hidden');
}
function showError(msg){const e=document.getElementById('error-msg');e.textContent=msg;e.classList.remove('hidden');}
async function handleLogin(e){
  e.preventDefault();
  try{const r=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('l-user').value,password:document.getElementById('l-pass').value})});
  if(!r.ok){const d=await r.json();showError(d.detail||'Login failed');return;}
  const d=await r.json();localStorage.setItem('convers_token',d.token);localStorage.setItem('convers_user',JSON.stringify(d));window.location.href='index.html';
  }catch(err){showError('Connection failed');}
}
async function handleSignup(e){
  e.preventDefault();
  try{const r=await fetch(API+'/auth/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('s-user').value,password:document.getElementById('s-pass').value,display_name:document.getElementById('s-name').value})});
  if(!r.ok){const d=await r.json();showError(d.detail||'Signup failed');return;}
  const d=await r.json();localStorage.setItem('convers_token',d.token);localStorage.setItem('convers_user',JSON.stringify(d));window.location.href='index.html';
  }catch(err){showError('Connection failed');}
}
// Redirect if already logged in
if(localStorage.getItem('convers_token'))window.location.href='index.html';
</script>
</body></html>
